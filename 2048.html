<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 · 网页小游戏</title>
  <style>
    /* ===== 基础重置 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 游戏页面通用 ===== */
    .game-page {
      width: 100%;
      max-width: 1100px;
      background: white;
      min-height: 100vh;
      padding-bottom: 3rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-banner {
      width: 100%;
      background: #3a3f4b;
      color: white;
      padding: 1rem 0;
      text-align: center;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 1px;
      position: relative;
    }

    .back-home-btn {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
      text-decoration: none;
    }

    .back-home-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.6);
    }

    .game-layout {
      width: 100%;
      max-width: 1000px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-start;
    }

    .rule-box {
      flex: 1 1 220px;
      background: #f0f3f8;
      padding: 1.2rem 1.5rem;
      border-radius: 24px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
      font-size: 0.95rem;
      color: #1e2a3a;
      line-height: 1.6;
      border: 1px solid #e2e8f0;
      min-width: 170px;
    }

    .rule-box h3 {
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #2c3e4e;
    }

    .game-controls {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      align-items: flex-start;
    }

    .ctrl-btn {
      background: #dce3ed;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: #1f2a3a;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      width: 100%;
      text-align: center;
    }

    .ctrl-btn:hover {
      background: #c8d2e0;
      transform: scale(0.97);
    }

    .ctrl-btn.primary {
      background: #3a3f4b;
      color: white;
    }

    .ctrl-btn.primary:hover {
      background: #2c313c;
    }

    .game-canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0.5rem 0 1rem;
    }

    #gameCanvas {
      background: #b7c0cd;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      max-width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      width: 400px;
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .back-home-btn { left: 0.8rem; padding: 0.2rem 0.8rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="game-page" style="display:flex;">
    <div class="game-banner">
      🎯 2048
      <a class="back-home-btn" href="main.html">← 首页</a>
    </div>

    <div class="game-layout">
      <div class="rule-box">
        <h3>📖 规则</h3>
        <p>使用方向键 (↑↓←→) 移动方块，相同数字合并，目标凑出2048。</p>
      </div>
      <div class="game-controls">
        <button class="ctrl-btn primary" id="startBtn">▶ 开始游戏</button>
        <button class="ctrl-btn" id="restartBtn">⟳ 重新开始</button>
      </div>
    </div>

    <div class="game-canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const size = 4;
      let grid = Array(size).fill().map(() => Array(size).fill(0));
      let score = 0;
      let gameOver = false;

      // roundRect polyfill
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          if (r > w/2) r = w/2;
          if (r > h/2) r = h/2;
          this.moveTo(x+r, y);
          this.lineTo(x+w-r, y);
          this.quadraticCurveTo(x+w, y, x+w, y+r);
          this.lineTo(x+w, y+h-r);
          this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
          this.lineTo(x+r, y+h);
          this.quadraticCurveTo(x, y+h, x, y+h-r);
          this.lineTo(x, y+r);
          this.quadraticCurveTo(x, y, x+r, y);
          this.closePath();
          return this;
        };
      }

      function draw() {
        ctx.clearRect(0,0,400,400);
        ctx.fillStyle = '#b7c0cd';
        ctx.fillRect(0,0,400,400);
        const colors = {0:'#cdd7e4',2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
        for (let r=0; r<size; r++) {
          for (let c=0; c<size; c++) {
            const val = grid[r][c];
            const x = c*100+10, y = r*100+10;
            ctx.fillStyle = colors[val] || '#3c3a32';
            ctx.shadowColor = 'rgba(0,0,0,0.05)';
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.roundRect(x, y, 80, 80, 12);
            ctx.fill();
            ctx.shadowBlur = 0;
            if (val) {
              ctx.fillStyle = val > 4 ? '#f9f6f2' : '#776e65';
              ctx.font = 'bold 28px sans-serif';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(val, x+40, y+42);
            }
          }
        }
        ctx.fillStyle = '#2c3e4e';
        ctx.font = '16px sans-serif';
        ctx.fillText('得分: ' + score, 20, 30);
        if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0,0,400,400);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 32px sans-serif';
          ctx.fillText('游戏结束', 200, 200);
        }
      }

      function addRandom() {
        const empty = [];
        for (let r=0; r<size; r++) for (let c=0; c<size; c++) if (!grid[r][c]) empty.push([r,c]);
        if (!empty.length) { gameOver = true; draw(); return; }
        const [r,c] = empty[Math.floor(Math.random()*empty.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function slide(row) {
        let arr = row.filter(v => v);
        for (let i=0; i<arr.length-1; i++) {
          if (arr[i] === arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); }
        }
        while (arr.length < size) arr.push(0);
        return arr;
      }

      function move(dir) {
        if (gameOver) return;
        let moved = false;
        if (dir === 'left') {
          for (let r=0; r<size; r++) { const newRow = slide(grid[r]); if (newRow.join() !== grid[r].join()) moved=true; grid[r]=newRow; }
        } else if (dir === 'right') {
          for (let r=0; r<size; r++) { const rev = [...grid[r]].reverse(); const newRow = slide(rev).reverse(); if (newRow.join() !== grid[r].join()) moved=true; grid[r]=newRow; }
        } else if (dir === 'up') {
          for (let c=0; c<size; c++) { const col = []; for (let r=0; r<size; r++) col.push(grid[r][c]); const newCol = slide(col); for (let r=0; r<size; r++) if (grid[r][c]!==newCol[r]) moved=true; for (let r=0; r<size; r++) grid[r][c]=newCol[r]; }
        } else if (dir === 'down') {
          for (let c=0; c<size; c++) { const col = []; for (let r=size-1; r>=0; r--) col.push(grid[r][c]); const newCol = slide(col); for (let r=0; r<size; r++) if (grid[size-1-r][c]!==newCol[r]) moved=true; for (let r=0; r<size; r++) grid[size-1-r][c]=newCol[r]; }
        }
        if (moved) { addRandom(); draw(); }
        let canMove = false;
        for (let r=0; r<size; r++) for (let c=0; c<size; c++) {
          if (!grid[r][c]) canMove = true;
          if (c<size-1 && grid[r][c]===grid[r][c+1]) canMove = true;
          if (r<size-1 && grid[r][c]===grid[r+1][c]) canMove = true;
        }
        if (!canMove) gameOver = true;
        draw();
      }

      function reset() {
        grid = Array(size).fill().map(() => Array(size).fill(0));
        score = 0; gameOver = false;
        addRandom(); addRandom(); draw();
      }

      const keyHandler = (e) => {
        const map = {ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right'};
        const dir = map[e.key];
        if (dir) { e.preventDefault(); move(dir); }
      };
      document.addEventListener('keydown', keyHandler);

      document.getElementById('startBtn').addEventListener('click', () => { reset(); });
      document.getElementById('restartBtn').addEventListener('click', () => { reset(); });

      reset();
    })();
  </script>
</body>
</html>
