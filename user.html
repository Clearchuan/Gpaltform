<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 · 赛博游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="page-shell">
    <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:16px;">
      <a class="btn" href="index.html">← 返回大厅</a>
      <h2 style="margin:0;">个人中心</h2>
    </div>
    <section class="sheet glass">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="muted">当前用户</div>
          <div class="value" id="nickname">-</div>
        </div>
        <div class="stat-card">
          <div class="muted">连续签到</div>
          <div class="value" id="streak">0</div>
        </div>
        <div class="stat-card">
          <div class="muted">本地总分</div>
          <div class="value" id="totalScore">0</div>
        </div>
      </div>
    </section>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const user = window.gamePlatform.getCurrentUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      document.getElementById('nickname').textContent = user.nickname;
      document.getElementById('streak').textContent = user.checkIn && user.checkIn.streak ? user.checkIn.streak : 0;
      const totalScore = Object.values(user.bestScores || {}).reduce(function (sum, item) { return sum + Number(item || 0); }, 0);
      document.getElementById('totalScore').textContent = totalScore;
    });
  </script>
</body>
</html>
