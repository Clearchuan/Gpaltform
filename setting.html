<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 · 赛博游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="page-shell">
    <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:16px;">
      <a class="btn" href="index.html">← 返回大厅</a>
      <h2 style="margin:0;">设置</h2>
    </div>
    <section class="sheet glass">
      <div class="form-group">
        <label>主题皮肤</label>
        <div class="row">
          <button class="btn" data-theme="neon">霓虹</button>
          <button class="btn" data-theme="aurora">极光</button>
          <button class="btn" data-theme="sunset">落日</button>
        </div>
      </div>
      <div class="form-group">
        <label>模式</label>
        <div class="row">
          <button class="btn" data-mode="dark">深色</button>
          <button class="btn" data-mode="light">浅色</button>
        </div>
      </div>
      <div class="form-group">
        <label>音量</label>
        <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.65">
      </div>
      <div class="form-group">
        <button class="btn btn-primary" id="muteBtn">🔊 音量</button>
      </div>
    </section>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/audio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const settings = window.gamePlatform.getSettings();
      document.querySelectorAll('[data-theme]').forEach(function (button) {
        button.addEventListener('click', function () {
          settings.theme = this.getAttribute('data-theme');
          window.gamePlatform.saveSettings(settings);
          window.uiHelper.applyTheme(settings);
        });
      });
      document.querySelectorAll('[data-mode]').forEach(function (button) {
        button.addEventListener('click', function () {
          settings.mode = this.getAttribute('data-mode');
          window.gamePlatform.saveSettings(settings);
          window.uiHelper.applyTheme(settings);
        });
      });
      const volumeRange = document.getElementById('volumeRange');
      volumeRange.value = settings.volume || 0.65;
      volumeRange.addEventListener('input', function () {
        window.audioHelper.setVolume(this.value);
      });
      document.getElementById('muteBtn').addEventListener('click', function () {
        const muted = window.audioHelper.toggleMute();
        this.textContent = muted ? '🔈 静音' : '🔊 音量';
      });
    });
  </script>
</body>
</html>
