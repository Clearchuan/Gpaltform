<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五子棋 · AI对战 & 双人对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 关键：禁止页面滚动 */
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 45px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 820px;
            /* 固定宽度，防止弹窗导致布局变化 */
            width: 750px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            color: #e0e0e0;
        }

        .game-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mode-selector {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            padding: 4px;
            border-radius: 30px;
        }

        .mode-btn {
            padding: 6px 18px;
            border: none;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
        }

        .mode-btn.active {
            background: rgba(78, 205, 196, 0.25);
            color: #4ecdc4;
            box-shadow: 0 2px 12px rgba(78, 205, 196, 0.15);
        }

        .mode-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.8);
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 18px 6px 12px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
        }

        .stone-dot {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        .black-dot {
            background: radial-gradient(circle at 38% 33%, #666, #111);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .white-dot {
            background: radial-gradient(circle at 37% 34%, #fff, #ccc);
            box-shadow: 0 2px 6px rgba(200,200,200,0.3);
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.09);
            color: #ddd;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #ff6b81, #e94560);
            box-shadow: 0 4px 18px rgba(233, 69, 96, 0.35);
        }

        .difficulty-selector {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px;
            border-radius: 20px;
        }

        .diff-btn {
            padding: 4px 14px;
            border: none;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
        }

        .diff-btn.active {
            background: rgba(249, 168, 212, 0.2);
            color: #f9a8d4;
        }

        .diff-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
        }

        .board-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #deb887;
            box-shadow: inset 0 0 80px rgba(101, 67, 23, 0.25), 
                        0 8px 42px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            touch-action: none;
        }

        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            /* 防止弹窗影响页面滚动和缩放 */
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }

        .confirm-modal.show {
            display: flex;
        }

        .confirm-box {
            background: #1e293b;
            border-radius: 20px;
            padding: 32px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.06);
            /* 防止内容溢出 */
            overflow: hidden;
        }

        .confirm-box .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .confirm-box .title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }

        .confirm-box .desc {
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-box .coord-display {
            font-size: 18px;
            font-weight: 600;
            color: #f5c842;
            background: rgba(255,255,255,0.05);
            padding: 6px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .confirm-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .confirm-btns button {
            padding: 10px 32px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.08);
            color: #ccc;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.15);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #4ecdc4, #44b09e);
            color: #fff;
        }

        .btn-confirm:hover {
            transform: scale(1.03);
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.68);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        .win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .win-text {
            font-size: 56px;
            font-weight: 900;
            color: #f5c842;
            text-shadow: 0 4px 30px rgba(245, 200, 66, 0.35);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .win-sub {
            font-size: 20px;
            color: #eee;
            margin-bottom: 24px;
            opacity: 0.85;
        }

        .win-btn {
            padding: 12px 54px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 28px rgba(241, 39, 17, 0.3);
        }

        .win-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 36px rgba(241, 39, 17, 0.45);
        }

        .footer-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
        }

        .history-count {
            color: rgba(255, 255, 255, 0.5);
        }

        .ai-thinking {
            color: #f9a8d4;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="game-title">⚫ 五子棋 ⚪</div>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pvp">👥 双人对战</button>
            <button class="mode-btn" data-mode="pve">🤖 人机对战</button>
        </div>
        <div class="status-area">
            <div class="turn-indicator" id="turnIndicator">
                <span class="stone-dot black-dot" id="turnDot"></span>
                <span id="turnText">黑方落子</span>
            </div>
            <div class="btn-group">
                <button class="btn" id="undoBtn" title="悔棋 (Ctrl+Z)">↩ 悔棋</button>
                <button class="btn btn-primary" id="resetBtn">⟳ 新一局</button>
            </div>
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end; margin-bottom: 12px; min-height: 32px;">
        <div class="difficulty-selector" id="difficultySelector" style="display: none;">
            <button class="diff-btn active" data-diff="easy">🌱 简单</button>
            <button class="diff-btn" data-diff="medium">🌿 中等</button>
            <button class="diff-btn" data-diff="hard">🌳 困难</button>
        </div>
    </div>

    <div class="board-container">
        <canvas id="boardCanvas" width="680" height="680"></canvas>
        
        <div class="win-overlay" id="winOverlay">
            <div class="win-text" id="winText">⚫ 黑胜</div>
            <div class="win-sub" id="winSub">恭喜获胜！</div>
            <button class="win-btn" id="playAgainBtn">🎮 再来一局</button>
        </div>
    </div>

    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-box">
            <div class="icon">📍</div>
            <div class="title">确认落子位置</div>
            <div class="desc">请确认你要将棋子放在这个位置。<br>确认后将轮到对方操作。</div>
            <div class="coord-display" id="coordDisplay">(7, 7)</div>
            <div class="confirm-btns">
                <button class="btn-cancel" id="cancelBtn">取消</button>
                <button class="btn-confirm" id="confirmBtn">✓ 确认落子</button>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <span id="modeHint">👥 双人对战 · 轮流落子</span>
        <span class="history-count" id="moveCount">第 0 手</span>
    </div>
</div>

<script>
    const BOARD_CONFIG = Object.freeze({
        SIZE: 15,
        CELL_SIZE: 43,
        PADDING: 29,
        STONE_RADIUS: 17.5,
        LINE_WIDTH: 1.2,
        STAR_POINTS: [
            [3, 3], [3, 7], [3, 11],
            [7, 3], [7, 7], [7, 11],
            [11, 3], [11, 7], [11, 11]
        ]
    });

    const EMPTY = 0;
    const BLACK = 1;
    const WHITE = 2;

    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    const turnDot = document.getElementById('turnDot');
    const turnText = document.getElementById('turnText');
    const moveCount = document.getElementById('moveCount');
    const winOverlay = document.getElementById('winOverlay');
    const winText = document.getElementById('winText');
    const winSub = document.getElementById('winSub');
    const modeHint = document.getElementById('modeHint');

    const resetBtn = document.getElementById('resetBtn');
    const undoBtn = document.getElementById('undoBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');

    const modeBtns = document.querySelectorAll('.mode-btn');
    const diffBtns = document.querySelectorAll('.diff-btn');
    const difficultySelector = document.getElementById('difficultySelector');

    const confirmModal = document.getElementById('confirmModal');
    const coordDisplay = document.getElementById('coordDisplay');
    const confirmBtn = document.getElementById('confirmBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    const state = {
        board: [],
        currentPlayer: BLACK,
        history: [],
        gameOver: false,
        winner: 0,
        winLine: null,
        mode: 'pvp',
        difficulty: 'easy',
        pendingMove: null,
        isAiThinking: false,
    };

    function createEmptyBoard(size) {
        return Array.from({ length: size }, () => Array(size).fill(EMPTY));
    }

    function pixelToRowCol(px, py) {
        const cfg = BOARD_CONFIG;
        const col = Math.round((px - cfg.PADDING) / cfg.CELL_SIZE);
        const row = Math.round((py - cfg.PADDING) / cfg.CELL_SIZE);
        if (row < 0 || row >= cfg.SIZE || col < 0 || col >= cfg.SIZE) return null;
        return { r: row, c: col };
    }

    function rowColToPixel(r, c) {
        const cfg = BOARD_CONFIG;
        return {
            x: cfg.PADDING + c * cfg.CELL_SIZE,
            y: cfg.PADDING + r * cfg.CELL_SIZE
        };
    }

    function getCoordLabel(r, c) {
        const letters = 'ABCDEFGHIJKLMNO';
        return `${letters[c]}${BOARD_CONFIG.SIZE - r}`;
    }

    function checkWinOnBoard(board, lastR, lastC, player) {
        const size = board.length;
        const directions = [
            [0, 1], [1, 0], [1, 1], [1, -1]
        ];

        for (const [dr, dc] of directions) {
            const line = [{ r: lastR, c: lastC }];

            for (let step = 1; step < 5; step++) {
                const nr = lastR + dr * step;
                const nc = lastC + dc * step;
                if (nr < 0 || nr >= size || nc < 0 || nc >= size) break;
                if (board[nr][nc] !== player) break;
                line.push({ r: nr, c: nc });
            }

            for (let step = 1; step < 5; step++) {
                const nr = lastR - dr * step;
                const nc = lastC - dc * step;
                if (nr < 0 || nr >= size || nc < 0 || nc >= size) break;
                if (board[nr][nc] !== player) break;
                line.unshift({ r: nr, c: nc });
            }

            if (line.length >= 5) return line;
        }
        return null;
    }

    class GomokuAI {
        constructor(difficulty) {
            this.difficulty = difficulty;
        }

        getBestMove(board, player) {
            const size = board.length;
            const opponent = player === BLACK ? WHITE : BLACK;
            
            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === EMPTY) {
                        emptyCells.push({ r, c });
                    }
                }
            }

            if (emptyCells.length === 0) return null;

            if (emptyCells.length === size * size) {
                const center = Math.floor(size / 2);
                return { r: center, c: center };
            }

            const scored = emptyCells.map(cell => ({
                ...cell,
                score: this.evaluatePosition(board, cell.r, cell.c, player, opponent)
            }));

            scored.sort((a, b) => b.score - a.score);

            if (this.difficulty === 'easy') {
                const top = scored.slice(0, Math.min(5, scored.length));
                return top[Math.floor(Math.random() * top.length)];
            } else if (this.difficulty === 'medium') {
                const top = scored.slice(0, Math.min(3, scored.length));
                return top[Math.floor(Math.random() * top.length)];
            } else {
                return scored[0];
            }
        }

        evaluatePosition(board, row, col, player, opponent) {
            let score = 0;
            const directions = [[0,1], [1,0], [1,1], [1,-1]];

            for (const [dr, dc] of directions) {
                const attackScore = this.evaluateDirection(board, row, col, dr, dc, player);
                const defendScore = this.evaluateDirection(board, row, col, dr, dc, opponent);
                score += attackScore * 1.1 + defendScore;
            }

            const center = Math.floor(board.length / 2);
            const distFromCenter = Math.abs(row - center) + Math.abs(col - center);
            score += (board.length - distFromCenter) * 0.5;

            return score;
        }

        evaluateDirection(board, row, col, dr, dc, player) {
            let count = 1;
            let openEnds = 0;

            let r = row + dr, c = col + dc;
            while (r >= 0 && r < board.length && c >= 0 && c < board.length && board[r][c] === player) {
                count++;
                r += dr;
                c += dc;
            }
            if (r >= 0 && r < board.length && c >= 0 && c < board.length && board[r][c] === EMPTY) {
                openEnds++;
            }

            r = row - dr;
            c = col - dc;
            while (r >= 0 && r < board.length && c >= 0 && c < board.length && board[r][c] === player) {
                count++;
                r -= dr;
                c -= dc;
            }
            if (r >= 0 && r < board.length && c >= 0 && c < board.length && board[r][c] === EMPTY) {
                openEnds++;
            }

            if (count >= 5) return 100000;
            if (count === 4) {
                if (openEnds === 2) return 10000;
                if (openEnds === 1) return 1000;
            }
            if (count === 3) {
                if (openEnds === 2) return 500;
                if (openEnds === 1) return 100;
            }
            if (count === 2) {
                if (openEnds === 2) return 50;
                if (openEnds === 1) return 10;
            }
            if (count === 1) {
                if (openEnds === 2) return 5;
                if (openEnds === 1) return 1;
            }

            return 0;
        }
    }

    const ai = new GomokuAI('easy');

    function commitMove(row, col) {
        if (state.gameOver) return false;
        if (state.board[row][col] !== EMPTY) return false;

        const player = state.currentPlayer;
        state.board[row][col] = player;
        state.history.push({ r: row, c: col, player });

        const winLine = checkWinOnBoard(state.board, row, col, player);
        if (winLine) {
            state.gameOver = true;
            state.winner = player;
            state.winLine = winLine;
            showWinScreen(player);
            updateStatus();
            render();
            return true;
        }

        if (state.history.length === BOARD_CONFIG.SIZE * BOARD_CONFIG.SIZE) {
            state.gameOver = true;
            state.winner = 0;
            showDrawScreen();
            updateStatus();
            render();
            return true;
        }

        state.currentPlayer = (player === BLACK) ? WHITE : BLACK;
        updateStatus();
        render();

        if (state.mode === 'pve' && !state.gameOver && state.currentPlayer === WHITE) {
            scheduleAiMove();
        }

        return true;
    }

    function scheduleAiMove() {
        if (state.isAiThinking) return;
        state.isAiThinking = true;
        updateStatus();
        
        setTimeout(() => {
            if (!state.gameOver && state.currentPlayer === WHITE) {
                const move = ai.getBestMove(state.board, WHITE);
                if (move) {
                    commitMove(move.r, move.c);
                }
            }
            state.isAiThinking = false;
            updateStatus();
        }, 300 + Math.random() * 400);
    }

    function undoMove() {
        if (state.gameOver) return;
        if (state.history.length === 0) return;

        if (state.mode === 'pve' && state.history.length >= 2) {
            const last1 = state.history.pop();
            state.board[last1.r][last1.c] = EMPTY;
            const last2 = state.history.pop();
            state.board[last2.r][last2.c] = EMPTY;
            state.currentPlayer = BLACK;
        } else {
            const last = state.history.pop();
            state.board[last.r][last.c] = EMPTY;
            state.currentPlayer = last.player;
        }
        
        state.winLine = null;
        updateStatus();
        render();
    }

    function resetGame() {
        state.board = createEmptyBoard(BOARD_CONFIG.SIZE);
        state.currentPlayer = BLACK;
        state.history = [];
        state.gameOver = false;
        state.winner = 0;
        state.winLine = null;
        state.pendingMove = null;
        state.isAiThinking = false;
        hideOverlay();
        hideConfirmModal();
        updateStatus();
        render();
    }

    function switchMode(mode) {
        state.mode = mode;
        modeBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });

        difficultySelector.style.display = mode === 'pve' ? 'flex' : 'none';
        modeHint.textContent = mode === 'pvp' 
            ? '👥 双人对战 · 轮流落子' 
            : '🤖 人机对战 · 你执黑先行';

        resetGame();
    }

    function switchDifficulty(diff) {
        state.difficulty = diff;
        ai.difficulty = diff;
        diffBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.diff === diff);
        });
        resetGame();
    }

    function showConfirmModal(row, col) {
        state.pendingMove = { r: row, c: col };
        const label = getCoordLabel(row, col);
        coordDisplay.textContent = `${label} (${row}, ${col})`;
        confirmModal.classList.add('show');
    }

    function hideConfirmModal() {
        confirmModal.classList.remove('show');
        state.pendingMove = null;
    }

    function onConfirmPlace() {
        if (!state.pendingMove) return;
        const { r, c } = state.pendingMove;
        hideConfirmModal();
        commitMove(r, c);
    }

    function updateStatus() {
        if (state.gameOver) {
            if (state.winner === BLACK) {
                turnDot.className = 'stone-dot black-dot';
                turnText.textContent = '黑方获胜';
            } else if (state.winner === WHITE) {
                turnDot.className = 'stone-dot white-dot';
                turnText.textContent = '白方获胜';
            } else {
                turnDot.className = 'stone-dot';
                turnText.textContent = '平局';
            }
        } else if (state.isAiThinking) {
            turnDot.className = 'stone-dot white-dot';
            turnText.innerHTML = '<span class="ai-thinking">AI 思考中...</span>';
        } else {
            if (state.currentPlayer === BLACK) {
                turnDot.className = 'stone-dot black-dot';
                turnText.textContent = state.mode === 'pve' ? '你的回合 (黑方)' : '黑方落子';
            } else {
                turnDot.className = 'stone-dot white-dot';
                turnText.textContent = state.mode === 'pve' ? 'AI 思考中...' : '白方落子';
            }
        }

        moveCount.textContent = `第 ${state.history.length} 手`;
    }

    function showWinScreen(player) {
        if (state.mode === 'pve') {
            if (player === BLACK) {
                winText.textContent = '🎉 你赢了！';
                winSub.textContent = '恭喜击败AI！';
            } else {
                winText.textContent = '😅 AI 获胜';
                winSub.textContent = '再接再厉，继续挑战！';
            }
        } else {
            const name = player === BLACK ? '⚫ 黑方' : '⚪ 白方';
            winText.textContent = `${name} 获胜！`;
            winSub.textContent = '五子连珠，精彩绝伦！';
        }
        winOverlay.classList.add('show');
    }

    function showDrawScreen() {
        winText.textContent = '🤝 平局';
        winSub.textContent = '棋逢对手，不分胜负';
        winOverlay.classList.add('show');
    }

    function hideOverlay() {
        winOverlay.classList.remove('show');
    }

    function render() {
        const cfg = BOARD_CONFIG;
        const size = cfg.SIZE;

        ctx.fillStyle = '#deb887';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.globalAlpha = 0.022;
        for (let i = 0; i < 150; i++) {
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.strokeStyle = '#8b6914';
            ctx.lineWidth = Math.random() * 2 + 0.5;
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        ctx.strokeStyle = '#5a4020';
        ctx.lineWidth = cfg.LINE_WIDTH;

        for (let i = 0; i < size; i++) {
            const x = cfg.PADDING + i * cfg.CELL_SIZE;
            ctx.beginPath();
            ctx.moveTo(x, cfg.PADDING);
            ctx.lineTo(x, cfg.PADDING + (size - 1) * cfg.CELL_SIZE);
            ctx.stroke();

            const y = cfg.PADDING + i * cfg.CELL_SIZE;
            ctx.beginPath();
            ctx.moveTo(cfg.PADDING, y);
            ctx.lineTo(cfg.PADDING + (size - 1) * cfg.CELL_SIZE, y);
            ctx.stroke();
        }

        ctx.fillStyle = '#5a4020';
        for (const [r, c] of cfg.STAR_POINTS) {
            const pos = rowColToPixel(r, c);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 4.5, 0, Math.PI * 2);
            ctx.fill();
        }

        for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
                const val = state.board[r][c];
                if (val === EMPTY) continue;
                const pos = rowColToPixel(r, c);
                drawStone(pos.x, pos.y, val);
            }
        }

        if (state.winLine) {
            for (const { r, c } of state.winLine) {
                const pos = rowColToPixel(r, c);
                ctx.strokeStyle = '#ffdd57';
                ctx.lineWidth = 3.5;
                ctx.shadowColor = '#ffdd57';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, cfg.STONE_RADIUS + 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        if (state.history.length > 0 && !state.gameOver) {
            const last = state.history[state.history.length - 1];
            const pos = rowColToPixel(last.r, last.c);
            ctx.fillStyle = last.player === BLACK ? '#fff' : '#000';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawStone(x, y, player) {
        const r = BOARD_CONFIG.STONE_RADIUS;
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.35)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 2;

        if (player === BLACK) {
            const grad = ctx.createRadialGradient(x - 5, y - 5, 3, x, y, r);
            grad.addColorStop(0, '#555');
            grad.addColorStop(0.5, '#222');
            grad.addColorStop(1, '#111');
            ctx.fillStyle = grad;
        } else {
            const grad = ctx.createRadialGradient(x - 5, y - 5, 3, x, y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.6, '#f0f0f0');
            grad.addColorStop(1, '#c8c8c8');
            ctx.fillStyle = grad;
        }

        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = player === BLACK ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.70)';
        ctx.beginPath();
        ctx.ellipse(x - 5, y - 5, 5, 3.5, -0.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    function handleCanvasClick(e) {
        if (state.gameOver) return;
        if (state.isAiThinking) return;

        if (state.mode === 'pve' && state.currentPlayer !== BLACK) return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const px = (e.clientX - rect.left) * scaleX;
        const py = (e.clientY - rect.top) * scaleY;

        const cell = pixelToRowCol(px, py);
        if (!cell) return;
        if (state.board[cell.r][cell.c] !== EMPTY) return;

        if (state.mode === 'pvp') {
            showConfirmModal(cell.r, cell.c);
        } else {
            commitMove(cell.r, cell.c);
        }
    }

    function handleKeydown(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
            e.preventDefault();
            undoMove();
        }
        if (e.key === 'r' || e.key === 'R') {
            if (!e.ctrlKey && !e.metaKey) {
                resetGame();
            }
        }
    }

    function init() {
        resetGame();

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => switchMode(btn.dataset.mode));
        });

        diffBtns.forEach(btn => {
            btn.addEventListener('click', () => switchDifficulty(btn.dataset.diff));
        });

        canvas.addEventListener('click', handleCanvasClick);
        window.addEventListener('keydown', handleKeydown);

        resetBtn.addEventListener('click', resetGame);
        undoBtn.addEventListener('click', undoMove);
        playAgainBtn.addEventListener('click', resetGame);

        confirmBtn.addEventListener('click', onConfirmPlace);
        cancelBtn.addEventListener('click', hideConfirmModal);
        confirmModal.addEventListener('click', (e) => {
            if (e.target === confirmModal) hideConfirmModal();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('click', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        }, { passive: false });

        switchMode('pvp');
    }

    init();
</script>
</body>
