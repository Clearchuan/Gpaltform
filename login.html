<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 赛博游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
    .auth-card { background: var(--panel-strong); }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="auth-shell">
    <div class="auth-card glass">
      <h1>赛博游戏厅</h1>
      <p class="subtext">登录后即可体验 13 款小游戏、保存成绩与每日签到。</p>
      <div class="form-group">
        <label for="nickname">昵称</label>
        <input id="nickname" class="input" placeholder="请输入昵称" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input id="password" class="input" type="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <label class="form-group" style="display:flex; align-items:center; gap:8px;">
        <input id="rememberMe" type="checkbox">
        <span>记住我</span>
      </label>
      <div class="status-line" id="statusLine"></div>
      <div class="form-actions row">
        <button id="loginBtn" class="btn btn-primary">登录</button>
        <button id="guestBtn" class="btn">游客免登</button>
      </div>
      <p class="form-note">还没有账号？<a href="register.html">立即注册</a></p>
    </div>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const statusLine = document.getElementById('statusLine');
      const loginBtn = document.getElementById('loginBtn');
      const guestBtn = document.getElementById('guestBtn');
      const rememberMe = document.getElementById('rememberMe');
      const currentUser = window.gamePlatform.getCurrentUser();
      if (currentUser) {
        window.location.href = 'index.html';
        return;
      }
      const rememberValue = localStorage.getItem(window.gamePlatform.STORAGE_KEYS.rememberMe);
      if (rememberValue) {
        rememberMe.checked = true;
      }
      function showState(message, success) {
        statusLine.textContent = message;
        statusLine.className = 'status-line' + (success ? ' success' : '');
      }
      loginBtn.addEventListener('click', function () {
        const result = window.gamePlatform.loginUser({
          nickname: document.getElementById('nickname').value.trim(),
          password: document.getElementById('password').value,
          rememberMe: rememberMe.checked
        });
        if (result.ok) {
          showState(result.message, true);
          window.uiHelper.showToast('登录成功', 'success');
          setTimeout(function () { window.location.href = 'index.html'; }, 600);
        } else {
          showState(result.message, false);
          window.uiHelper.showToast(result.message, 'fail');
        }
      });
      guestBtn.addEventListener('click', function () {
        window.gamePlatform.loginGuest();
        window.uiHelper.showToast('已以游客身份进入', 'success');
        setTimeout(function () { window.location.href = 'index.html'; }, 600);
      });
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          loginBtn.click();
        }
      });
    });
  </script>
</body>
</html>
