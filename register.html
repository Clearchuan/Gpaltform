<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 · 赛博游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
    .auth-card { background: var(--panel-strong); }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="auth-shell">
    <div class="auth-card glass">
      <h1>创建你的赛博账号</h1>
      <p class="subtext">注册后即可同步最高分、签到与主题偏好。</p>
      <div class="form-group">
        <label for="nickname">昵称</label>
        <input id="nickname" class="input" placeholder="请输入昵称" autocomplete="nickname">
      </div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input id="email" class="input" type="email" placeholder="请输入邮箱" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input id="password" class="input" type="password" placeholder="请输入密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input id="confirmPassword" class="input" type="password" placeholder="再次输入密码" autocomplete="new-password">
      </div>
      <div class="status-line" id="statusLine"></div>
      <div class="form-actions row">
        <button class="btn btn-primary" id="registerBtn">注册</button>
        <a class="btn" href="login.html">返回登录</a>
      </div>
      <p class="form-note">已有账号？<a href="login.html">立即登录</a></p>
    </div>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const statusLine = document.getElementById('statusLine');
      const registerBtn = document.getElementById('registerBtn');
      const fields = ['nickname', 'email', 'password', 'confirmPassword'];
      function validate() {
        const nickname = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (!nickname || !email || !password || !confirmPassword) {
          statusLine.textContent = '请完整填写所有项。';
          statusLine.className = 'status-line';
          return false;
        }
        if (password.length < 6) {
          statusLine.textContent = '密码至少需要 6 位。';
          statusLine.className = 'status-line';
          return false;
        }
        if (password !== confirmPassword) {
          statusLine.textContent = '两次输入密码不一致。';
          statusLine.className = 'status-line';
          return false;
        }
        statusLine.textContent = '信息格式正确。';
        statusLine.className = 'status-line success';
        return true;
      }
      fields.forEach(function (id) {
        document.getElementById(id).addEventListener('input', validate);
      });
      registerBtn.addEventListener('click', function () {
        if (!validate()) return;
        const result = window.gamePlatform.registerUser({
          nickname: document.getElementById('nickname').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          confirmPassword: document.getElementById('confirmPassword').value
        });
        statusLine.textContent = result.message;
        statusLine.className = 'status-line' + (result.ok ? ' success' : '');
        if (result.ok) {
          window.uiHelper.showToast('注册成功，正在前往登录', 'success');
          setTimeout(function () { window.location.href = 'login.html'; }, 700);
        }
      });
    });
  </script>
</body>
</html>
