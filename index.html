<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛博游戏厅 · 大厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; }
    .topbar .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .hero { padding:24px; border-radius:24px; margin-bottom:20px; }
    .hero h1 { margin:0 0 8px; font-size:2rem; }
    .hero p { margin:0; color:var(--muted); }
    .games-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:16px; }
    .mini-chip { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,0.08); color:var(--text); }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="page-shell">
    <div class="topbar">
      <div class="badge">⚡ 赛博游戏厅</div>
      <div class="actions">
        <a class="btn" href="user.html">个人中心</a>
        <a class="btn" href="rank.html">排行榜</a>
        <a class="btn" href="setting.html">设置</a>
        <button class="btn" id="logoutBtn">退出登录</button>
      </div>
    </div>
    <section class="hero glass">
      <div class="row" style="justify-content:space-between; align-items:center;">
        <div>
          <h1 id="welcomeText">欢迎来到赛博游戏厅</h1>
          <p>所有成绩、皮肤、签到与偏好都保存在本地，适配电脑、平板与手机。</p>
        </div>
        <div class="row">
          <button class="btn btn-primary" id="checkInBtn">🎯 每日签到</button>
          <button class="btn" id="themeBtn">🌈 主题</button>
        </div>
      </div>
      <div class="row" style="margin-top:14px;">
        <div class="mini-chip">🎮 13 款游戏</div>
        <div class="mini-chip">🏆 本地最高分</div>
        <div class="mini-chip">🎧 音效系统</div>
      </div>
    </section>
    <section class="sheet glass">
      <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:14px;">
        <h2 style="margin:0;">游戏库</h2>
        <div class="row">
          <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="0.65">
          <button class="btn" id="muteBtn">🔊 音量</button>
        </div>
      </div>
      <div class="games-grid" id="gamesGrid"></div>
    </section>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/hall.js"></script>
  <script src="js/audio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const logoutBtn = document.getElementById('logoutBtn');
      const checkInBtn = document.getElementById('checkInBtn');
      const themeBtn = document.getElementById('themeBtn');
      const settings = window.gamePlatform.getSettings();
      const currentUser = window.gamePlatform.getCurrentUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }
      logoutBtn.addEventListener('click', function () {
        window.gamePlatform.logout();
        window.location.href = 'login.html';
      });
      checkInBtn.addEventListener('click', function () {
        const result = window.gamePlatform.checkIn();
        window.uiHelper.showToast(result.message, result.ok ? 'success' : 'fail');
        if (window.audioHelper && window.audioHelper.beep) {
          window.audioHelper.beep(result.ok ? 'success' : 'fail');
        }
      });
      themeBtn.addEventListener('click', function () {
        const next = settings.theme === 'neon' ? 'aurora' : settings.theme === 'aurora' ? 'sunset' : 'neon';
        settings.theme = next;
        window.gamePlatform.saveSettings(settings);
        window.uiHelper.applyTheme(settings);
        window.uiHelper.showToast('主题已切换', 'success');
      });
      document.getElementById('muteBtn').addEventListener('click', function () {
        if (window.audioHelper && window.audioHelper.toggleMute) {
          const muted = window.audioHelper.toggleMute();
          this.textContent = muted ? '🔈 静音' : '🔊 音量';
        }
      });
    });
  </script>
</body>
</html>
