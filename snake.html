<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;background:#000;user-select:none;}
body{display:flex;flex-direction:column;align-items:center;margin-top:30px}
#score{color:#fff;font-size:26px;margin-bottom:12px}
canvas{border:3px solid #333}
.back{margin-top:20px;padding:10px 24px;background:#0f0;color:#000;text-decoration:none;font-size:18px;border-radius:4px}
</style>
</head>
<body>
<div id="score">得分：0</div>
<canvas id="game" width="400" height="400"></canvas>
<a class="back" href="index.html">返回游戏主页</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreText = document.getElementById("score");
const size = 20;
const gridMax = canvas.width / size;
let speed = 8;
let score = 0;
let snake = [{x:10,y:10}];
let dx = 1, dy = 0;
let food = {};
let obstacles = [];
let maxObsLimit = 10;
let addObsThreshold = 50;

function createFood(){
    let newFood;
    while(!newFood || isOverlap(newFood)){
        newFood = {
            x:Math.floor(Math.random() * gridMax),
            y:Math.floor(Math.random() * gridMax)
        }
    }
    return newFood;
}

function isOverlap(pos){
    for(let seg of snake){
        if(seg.x === pos.x && seg.y === pos.y) return true;
    }
    for(let obs of obstacles){
        if(obs.x === pos.x && obs.y === pos.y) return true;
    }
    return false;
}

function createOneObs(){
    let obs;
    while(!obs || isOverlap(obs)){
        obs = {
            x:Math.floor(Math.random() * gridMax),
            y:Math.floor(Math.random() * gridMax)
        }
    }
    return obs;
}

function updateObstacleByScore(){
    obstacles = [];
    let targetNum = 3 + Math.floor(score / addObsThreshold);
    if(targetNum > maxObsLimit) targetNum = maxObsLimit;
    for(let i = 0; i < targetNum; i++){
        obstacles.push(createOneObs());
    }
}

// ==========修复转向逻辑==========
document.addEventListener("keydown",e=>{
    // 向上：只有当前不向下才能切换
    if(e.key==="ArrowUp" && dy !== 1){
        dx = 0;
        dy = -1;
    }
    // 向下：只有当前不向上才能切换
    if(e.key==="ArrowDown" && dy !== -1){
        dx = 0;
        dy = 1;
    }
    // 向左：只有当前不向右才能切换
    if(e.key==="ArrowLeft" && dx !== 1){
        dx = -1;
        dy = 0;
    }
    // 向右：只有当前不向左才能切换
    if(e.key==="ArrowRight" && dx !== -1){
        dx = 1;
        dy = 0;
    }
})

function loop(){
    let head = {x:snake[0].x + dx, y:snake[0].y + dy};

    // 穿墙逻辑
    if(head.x < 0) head.x = gridMax - 1;
    if(head.x >= gridMax) head.x = 0;
    if(head.y < 0) head.y = gridMax - 1;
    if(head.y >= gridMax) head.y = 0;

    // 撞自身结束
    for(let seg of snake){
        if(seg.x === head.x && seg.y === head.y){
            gameOver();
            return;
        }
    }
    // 撞障碍物结束
    for(let obs of obstacles){
        if(obs.x === head.x && obs.y === head.y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
        score += 10;
        scoreText.textContent = "得分：" + score;
        food = createFood();
        updateObstacleByScore();
        if(speed < 16) speed += 0.2;
    }else{
        snake.pop();
    }

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#666";
    obstacles.forEach(item=>ctx.fillRect(item.x*size, item.y*size, size-2, size-2));
    ctx.fillStyle="#f33";
    ctx.fillRect(food.x*size, food.y*size, size-2, size-2);
    ctx.fillStyle="#0f0";
    snake.forEach(item=>ctx.fillRect(item.x*size, item.y*size, size-2, size-2));
}

function gameOver(){
    alert("游戏结束！撞到障碍物或自身");
    snake = [{x:10,y:10}];
    dx=1; dy=0;
    score=0;
    speed=8;
    scoreText.textContent="得分：0";
    updateObstacleByScore();
    food = createFood();
}

updateObstacleByScore();
food = createFood();
function runGame(){
    loop();
    setTimeout(runGame, 1000/speed);
}
runGame();
</script>
</body>
</html>
