<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>排行榜 - GamePlatform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="particle-bg" aria-hidden="true"></div>
  <main class="container neon-card">
    <h2>本地排行榜（基于 localStorage）</h2>
    <div id="leaderboards"></div>
    <a href="index.html" class="btn">返回大厅</a>
  </main>

  <script src="js/auth.js"></script>
  <script>
    (function(){
      const users = Auth.getAllUsers();
      // 构建每个游戏的排行榜
      const scoresByGame = {};
      for (const u of users) {
        const games = u.games || {};
        for (const [g, d] of Object.entries(games)) {
          scoresByGame[g] = scoresByGame[g] || [];
          scoresByGame[g].push({nick:u.nickname||u.email, best:d.best||0, plays:d.plays||0});
        }
      }
      const container = document.getElementById('leaderboards');
      const html = Object.entries(scoresByGame).map(([g, arr])=>{
        arr.sort((a,b)=>b.best-a.best);
        const rows = arr.slice(0,10).map((r,i)=>`<tr><td>${i+1}</td><td>${r.nick}</td><td>${r.best}</td><td>${r.plays}</td></tr>`).join('');
        return `<h3>${g}</h3><table class="leaderboard"><thead><tr><th>#</th><th>玩家</th><th>最高分</th><th>次数</th></tr></thead><tbody>${rows}</tbody></table>`;
      }).join('');
      container.innerHTML = html || '<p>暂无成绩数据</p>';
    })();
  </script>
</body>
</html>
