<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 · 赛博游戏厅</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/games.css">
  <style>
    body { background-image: url('assets/images/bg.png'); background-size: cover; background-position: center; }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="page-shell">
    <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:16px;">
      <a class="btn" href="index.html">← 返回大厅</a>
      <h2 style="margin:0;">排行榜</h2>
    </div>
    <section class="sheet glass">
      <div class="rank-list" id="rankList"></div>
    </section>
  </div>
  <script src="js/platform.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const list = document.getElementById('rankList');
      const rankings = window.gamePlatform.getRankings();
      list.innerHTML = rankings.map(function (item, index) {
        return '<div class="rank-item"><div><strong>#' + (index + 1) + ' ' + item.nickname + '</strong><div class="muted">' + (item.guest ? '游客身份' : '注册用户') + '</div></div><div><strong>' + item.bestScore + '</strong></div></div>';
      }).join('');
    });
  </script>
</body>
</html>
