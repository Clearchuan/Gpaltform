<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数字华容道 · 网页小游戏</title>
  <style>
    /* ===== 基础重置 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== 游戏页面通用 ===== */
    .game-page {
      width: 100%;
      max-width: 1100px;
      background: white;
      min-height: 100vh;
      padding-bottom: 3rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-banner {
      width: 100%;
      background: #3a3f4b;
      color: white;
      padding: 1rem 0;
      text-align: center;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 1px;
      position: relative;
    }

    .back-home-btn {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
      text-decoration: none;
    }

    .back-home-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.6);
    }

    .game-layout {
      width: 100%;
      max-width: 1000px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-start;
    }

    .rule-box {
      flex: 1 1 220px;
      background: #f0f3f8;
      padding: 1.2rem 1.5rem;
      border-radius: 24px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
      font-size: 0.95rem;
      color: #1e2a3a;
      line-height: 1.6;
      border: 1px solid #e2e8f0;
      min-width: 170px;
    }

    .rule-box h3 {
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #2c3e4e;
    }

    .game-controls {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      align-items: flex-start;
    }

    .ctrl-btn {
      background: #dce3ed;
      border: none;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      color: #1f2a3a;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      width: 100%;
      text-align: center;
    }

    .ctrl-btn:hover {
      background: #c8d2e0;
      transform: scale(0.97);
    }

    .ctrl-btn.primary {
      background: #3a3f4b;
      color: white;
    }

    .ctrl-btn.primary:hover {
      background: #2c313c;
    }

    .game-canvas-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0.5rem 0 1rem;
    }

    #gameCanvas {
      background: #b7c0cd;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      max-width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      width: 400px;
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .back-home-btn { left: 0.8rem; padding: 0.2rem 0.8rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="game-page" style="display:flex;">
    <div class="game-banner">
      🎯 数字华容道
      <a class="back-home-btn" href="main.html">← 首页</a>
    </div>

    <div class="game-layout">
      <div class="rule-box">
        <h3>📖 规则</h3>
        <p>方向键移动数字，将1~15按顺序排列。</p>
      </div>
      <div class="game-controls">
        <button class="ctrl-btn primary" id="startBtn">▶ 开始游戏</button>
        <button class="ctrl-btn" id="restartBtn">⟳ 重新开始</button>
      </div>
    </div>

    <div class="game-canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      let tiles = Array(16).fill().map((_,i)=>i);
      let empty = 15;
      let solved = false;

      // roundRect polyfill
      if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
          if (r > w/2) r = w/2;
          if (r > h/2) r = h/2;
          this.moveTo(x+r, y);
          this.lineTo(x+w-r, y);
          this.quadraticCurveTo(x+w, y, x+w, y+r);
          this.lineTo(x+w, y+h-r);
          this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
          this.lineTo(x+r, y+h);
          this.quadraticCurveTo(x, y+h, x, y+h-r);
          this.lineTo(x, y+r);
          this.quadraticCurveTo(x, y, x+r, y);
          this.closePath();
          return this;
        };
      }

      function draw() {
        ctx.clearRect(0,0,400,400);
        ctx.fillStyle = '#b7c0cd';
        ctx.fillRect(0,0,400,400);
        for (let i=0; i<16; i++) {
          const val = tiles[i];
          if (val === 0) continue;
          const r = Math.floor(i/4), c = i%4;
          const x = c*100+8, y = r*100+8;
          ctx.fillStyle = '#eaeef3';
          ctx.shadowColor = 'rgba(0,0,0,0.08)';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.roundRect(x, y, 84, 84, 14);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#1e2a3a';
          ctx.font = 'bold 30px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(val, x+42, y+44);
        }
        if (solved) {
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(0,0,400,400);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 36px sans-serif';
          ctx.fillText('🎉 胜利', 200, 200);
        }
      }

      function shuffle() {
        for (let i=0; i<200; i++) {
          const neighbors = [];
          const r = Math.floor(empty/4), c = empty%4;
          if (r>0) neighbors.push(empty-4);
          if (r<3) neighbors.push(empty+4);
          if (c>0) neighbors.push(empty-1);
          if (c<3) neighbors.push(empty+1);
          const pick = neighbors[Math.floor(Math.random()*neighbors.length)];
          tiles[empty] = tiles[pick];
          tiles[pick] = 0;
          empty = pick;
        }
        solved = false;
        draw();
      }

      function move(dir) {
        if (solved) return;
        const r = Math.floor(empty/4), c = empty%4;
        let target = -1;
        if (dir === 'up' && r<3) target = empty+4;
        else if (dir === 'down' && r>0) target = empty-4;
        else if (dir === 'left' && c<3) target = empty+1;
        else if (dir === 'right' && c>0) target = empty-1;
        if (target === -1) return;
        tiles[empty] = tiles[target];
        tiles[target] = 0;
        empty = target;
        let win = true;
        for (let i=0; i<15; i++) if (tiles[i] !== i+1) win = false;
        if (win) solved = true;
        draw();
      }

      const keyHandler = (e) => {
        const map = {ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right'};
        const dir = map[e.key];
        if (dir) { e.preventDefault(); move(dir); }
      };
      document.addEventListener('keydown', keyHandler);

      function reset() { shuffle(); }

      document.getElementById('startBtn').addEventListener('click', reset);
      document.getElementById('restartBtn').addEventListener('click', reset);

      shuffle();
    })();
  </script>
</body>
</html>
